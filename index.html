<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <link rel="icon"  href="src/img/logo.png" type="image/png">
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/config.css">
    <link rel="stylesheet" href="src/css/imgsld.css">
</head>
<body>
    <div class="hero">
        <div class="bg-low"></div>
        <div class="circle"></div>
        <div class="circle-ui"></div>
        <img class="bg" src="src/img/hatsu.png" alt="Logo" width="100%" height="100%">

        <div class="profile">
            <img class="profile-pic" src="src/img/logo.png" alt="Profile Picture">
            
            <div class="profile-text">
                <h1>Salmotide</h1>
                <p>[ Frontend Developer ]</p>
            </div>
        </div>

        <a href="#" class="aboutme">
            <h1>About Me</h1>
        </a>

        <a href="#" class="btnproject">
            <h1>My Project</h1>
        </a>

        <div class="imgsld">
            <img class="sld curn" src="src/img/projects/bot.webp" alt="botwa">
            <img class="sld next" src="src/img/projects/desktop.webp" alt="desktop">
        </div>

        <div class="sosial">
            <div class="imgsos">
                <a href="https://github.com/salmotide">
                    <img src="src/img/icon/git.webp" alt="Gitub" width="100%" height="100%">
                <div class="line"></div>
                </a>
            </div>

            <div class="imgsos">
                <a href="https://www.youtube.com/@salmotide">
                    <img src="src/img/icon/yt.webp" alt="YouTube" width="100%" height="100%">
                <div class="line"></div>
                </a>
            </div>
        </div>
    </div>
    <script src="src/js/project.js"></script>
</body>
</html>
